<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhonatan iPhones | Loja Oficial</title>
    <style>
        /* CSS - O Estilo da Loja */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000; /* Fundo preto luxuoso */
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: rgba(0, 0, 0, 0.8);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        h1 { font-weight: 300; letter-spacing: 1px; margin: 0; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
        }

        /* Card do iPhone */
        .iphone-card {
            background: #1c1c1e;
            border-radius: 25px;
            padding: 25px;
            width: 280px;
            text-align: center;
            border: 1px solid #333;
            transition: all 0.4s ease;
        }

        .iphone-card:hover {
            transform: translateY(-10px);
            border-color: #0071e3;
            box-shadow: 0 15px 40px rgba(0, 113, 227, 0.3);
        }

        .iphone-card img {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;
        }

        .modelo { font-size: 24px; margin: 10px 0; font-weight: 600; }
        .info { color: #86868b; font-size: 14px; margin-bottom: 20px; }
        .preco { font-size: 26px; font-weight: bold; color: #f5f5f7; margin-bottom: 20px; }

        .btn-comprar {
            background-color: #0071e3;
            color: white;
            text-decoration: none;
            padding: 12px 0;
            border-radius: 30px;
            display: block;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-comprar:hover {
            background-color: #0077ed;
        }
    </style>
</head>
<body>

    <header>
        <h1>Jhonatan iPhones </h1>
    </header>

   <div class="container">
        <div class="iphone-card">
            <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=5120&hei=2880&fmt=p-jpg&qlt=80&.v=1692845702708" alt="iPhone 15 Pro Max">
            <div class="modelo">iPhone 15 Pro Max</div>
            <div class="info">Titânio Natural, 256GB</div>
            <div class="preco">R$ 7.499</div>
            <a href="https://wa.me/5500000000000?text=Olá! Tenho interesse no iPhone 15 Pro Max" class="btn-comprar">Comprar agora</a>
        </div>

        <div class="iphone-card">
            <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-finish-select-202309-6-1inch-blue?wid=5120&hei=2880&fmt=p-jpg&qlt=80&.v=1692923777972" alt="iPhone 15">
            <div class="modelo">iPhone 15</div>
            <div class="info">Azul, 128GB, Tela 6.1"</div>
            <div class="preco">R$ 5.199</div>
            <a href="https://wa.me/5500000000000?text=Olá! Tenho interesse no iPhone 15" class="btn-comprar">Comprar agora</a>
        </div>
    </div>
        </div>
    </div>

</body>
</html>
